<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Millora el teu CV amb IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Vend+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      background: #f5f7fa;
      text-align: center;
    }
    header {
      background: #4A90E2;
      color: white;
      padding: 40px 20px;
    }
    h1 {
      margin: 0;
      font-size: 2.5em;
    }
    p {
      font-size: 1.2em;
    }
    .container {
      padding: 40px 20px;

      border-radius: 10px;
      background-color: white;
      width: fit-content;
      
    }
    .cta {
      background: #ff6b6b;
      color: white;
      padding: 15px 30px;
      font-size: 1.2em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;

      transition: all 0.3s ease;
    }
    .cta:hover {
      background: #ff4b4b;
      transform: scale(1.1);
    }
    .steps {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    .step {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .flex1{
        display: flex;
        justify-content: center;
        padding-top: 30px;
    }
  </style>
</head>
<body>

<header>
  <h1>Millora el teu CV amb IA</h1>
  <p>Corregeix errors, millora el text i destaca davant les empreses en segons</p>
  <button class="cta">Prova-ho gratis</button>
</header>
<main>
    <div class="flex1">
        <div class="container">
        <h2>Com funciona?</h2>

        <div class="steps">
        <div class="step">
            <h3>1. Puja el CV</h3>
            <p>Carrega el teu document en PDF o text</p>
        </div>

        <div class="step">
            <h3>2. IA l’analitza</h3>
            <p>Detecta errors i millora el contingut</p>
        </div>

        <div class="step">
            <h3>3. Rep millores</h3>
            <p>Obté una versió optimitzada</p>
        </div>
        </div>

        <button class="cta">Millora el meu CV</button>
        </div>
    </div>
</main>
</body>
</html>
